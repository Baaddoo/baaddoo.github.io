            display: inline-block;

            height: 13px;

            border: 1px solid #16a085;

        #fill {
            height: 100%;

            box-shadow: 2px 0 10px inset rgba(0, 0, 0, 0.2);
            transition: width 2s ease-out;
            width: 0%;
            transition: width 0.5s;
        }

        @keyframes move {
            0% {

            }
            100% {
